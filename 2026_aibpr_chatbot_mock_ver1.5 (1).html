<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MY 人事申請 Agent</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: 'Meiryo', 'Hiragino Kaku Gothic Pro', sans-serif;
      background: #f0f5f5;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      font-size: 13px
    }

    /* Header */
    #header {
      background: #0d4f4e;
      color: white;
      padding: 6px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 8px
    }

    .my-badge {
      background: #1a9090;
      color: white;
      width: 28px;
      height: 28px;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 11px;
      flex-shrink: 0
    }

    .header-title {
      font-size: 15px;
      font-weight: 600
    }

    .proto-badge {
      background: #e8a020;
      color: white;
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px
    }

    /* Progress */
    #progress-bar {
      background: white;
      padding: 7px 20px;
      border-bottom: 1px solid #e0e8e8;
      flex-shrink: 0;
      min-height: 0
    }

    .prog-items {
      display: flex;
      align-items: center;
      width: 100%
    }

    .prog-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px
    }

    .prog-circle {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700
    }

    .prog-label {
      font-size: 10px;
      white-space: nowrap
    }

    .prog-line {
      flex: 1;
      height: 2px;
      margin-top: 11px;
      margin-bottom: auto
    }

    .prog-done .prog-circle,
    .prog-current .prog-circle {
      background: #0d6b69;
      color: white;
      border-color: #0d6b69
    }

    .prog-current .prog-circle {
      box-shadow: 0 0 0 3px rgba(13, 107, 105, .2)
    }

    .prog-done .prog-label,
    .prog-current .prog-label {
      color: #0d6b69;
      font-weight: 700
    }

    .prog-future .prog-circle {
      background: white;
      color: #bbb;
      border-color: #ddd
    }

    .prog-future .prog-label {
      color: #bbb
    }

    .prog-line-done {
      background: #0d6b69
    }

    .prog-line-future {
      background: #ddd
    }

    /* Main */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
      gap: 10px;
      padding: 8px 14px
    }

    /* Mode panel */
    #mode-panel {
      width: 170px;
      flex-shrink: 0;
      overflow-y: auto
    }

    .panel-box {
      background: white;
      border: 1px solid #e0e8e8;
      border-radius: 8px;
      padding: 12px
    }

    .panel-title {
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 10px;
      color: #333
    }

    .mode-btn {
      width: 100%;
      border: 1.5px solid #0d6b69;
      color: #0d6b69;
      background: white;
      border-radius: 20px;
      padding: 7px 8px;
      font-size: 11.5px;
      cursor: pointer;
      margin-bottom: 6px;
      font-weight: 500;
      transition: all .15s;
      text-align: center;
      line-height: 1.3
    }

    .mode-btn:hover {
      background: #e0f4f2
    }

    .mode-btn.active {
      background: #0d6b69;
      color: white
    }

    .divider {
      border: none;
      border-top: 1px solid #e0e8e8;
      margin: 8px 0
    }

    /* Chat */
    #chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0
    }

    #form-area {
      flex-shrink: 0;
      max-height: 58vh;
      overflow-y: auto;
      padding: 4px 0
    }

    #faq-input-area {
      flex-shrink: 0;
      padding: 6px 0;
      display: none
    }

    #faq-input {
      width: 100%;
      border: 1px solid #b0d4d3;
      border-radius: 20px;
      padding: 9px 16px;
      font-size: 13px;
      outline: none;
      font-family: inherit
    }

    #faq-input:focus {
      border-color: #0d6b69
    }

    /* Messages */
    .msg {
      display: flex;
      gap: 8px;
      margin: 3px 0;
      padding: 8px 10px;
      border-radius: 10px;
      line-height: 1.65
    }

    .msg-bot {
      background: #dff0ef
    }

    .msg-user {
      background: #ffffff;
      border: 1px solid #ebebeb;
      flex-direction: row-reverse
    }

    .msg-avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 2px
    }

    .avatar-bot {
      background: #0d6b69;
      color: white
    }

    .avatar-user {
      background: #888;
      color: white
    }

    .msg-content {
      flex: 1;
      word-break: break-word
    }

    .msg-user .msg-content {
      text-align: right
    }

    /* Forms */
    .form-box {
      background: white;
      border: 1px solid #e0e8e8;
      border-radius: 8px;
      padding: 14px
    }

    .form-group {
      margin-bottom: 10px
    }

    .form-label {
      font-size: 12px;
      font-weight: 600;
      color: #333;
      margin-bottom: 3px;
      display: block
    }

    .form-input {
      width: 100%;
      border: 1px solid #b0d4d3;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 13px;
      outline: none;
      font-family: inherit
    }

    .form-input:focus {
      border-color: #0d6b69
    }

    .form-select {
      width: 100%;
      border: 1px solid #b0d4d3;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 13px;
      outline: none;
      background: white;
      font-family: inherit
    }

    .form-textarea {
      width: 100%;
      border: 1px solid #b0d4d3;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 13px;
      outline: none;
      font-family: inherit;
      resize: vertical
    }

    .btn-primary {
      background: #0d6b69;
      color: white;
      border: none;
      border-radius: 20px;
      padding: 7px 18px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 600;
      transition: background .15s
    }

    .btn-primary:hover {
      background: #0a5553
    }

    .btn-secondary {
      background: white;
      color: #0d6b69;
      border: 1.5px solid #0d6b69;
      border-radius: 20px;
      padding: 7px 18px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 500;
      transition: all .15s
    }

    .btn-secondary:hover {
      background: #e0f4f2
    }

    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 10px
    }

    .col2 {
      display: flex;
      gap: 10px
    }

    .col2>* {
      flex: 1
    }

    .section-label {
      font-weight: 700;
      font-size: 13px;
      margin: 8px 0 5px
    }

    .expander {
      border: 1px solid #e0e8e8;
      border-radius: 6px;
      margin-bottom: 8px
    }

    .expander-header {
      padding: 7px 12px;
      font-weight: 600;
      font-size: 13px;
      background: #f8fafa;
      border-radius: 6px;
      cursor: default
    }

    .expander-body {
      padding: 10px 12px
    }

    .file-upload-area {
      border: 2px dashed #b0d4d3;
      border-radius: 8px;
      padding: 18px;
      text-align: center;
      color: #666;
      cursor: pointer;
      transition: all .15s
    }

    .file-upload-area:hover {
      border-color: #0d6b69;
      background: #f0fafa
    }

    .file-upload-area.dragover {
      border-color: #0d6b69;
      background: #e6f7f6
    }

    .file-name {
      margin-top: 6px;
      font-size: 11px;
      color: #0d6b69;
      font-weight: 600
    }

    .file-meta-row {
      margin-top: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      flex-wrap: wrap
    }

    .file-clear-btn {
      border: 1px solid #c9dddd;
      background: #fff;
      color: #0d6b69;
      border-radius: 14px;
      font-size: 10px;
      padding: 2px 8px;
      cursor: pointer
    }

    .file-clear-btn:hover {
      background: #eaf6f5
    }

    .pdf-inline-thumb {
      width: 130px;
      height: 90px;
      border: 1px solid #d6e4e3;
      border-radius: 6px;
      overflow: hidden;
      background: #fff;
      margin: 6px auto 4px;
      cursor: pointer;
      display: block
    }

    .pdf-inline-thumb embed {
      width: 100%;
      height: 100%;
      border: none;
      pointer-events: none
    }

    .img-inline-thumb {
      width: 130px;
      height: 90px;
      border: 1px solid #d6e4e3;
      border-radius: 6px;
      overflow: hidden;
      background: #fff;
      margin: 6px auto 4px;
      cursor: zoom-in;
      display: block
    }

    .img-inline-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block
    }

    .pdf-chat-thumb {
      width: 220px;
      border: 1px solid #d6e4e3;
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
      margin-top: 6px;
      cursor: pointer
    }

    .pdf-chat-thumb embed {
      width: 100%;
      height: 150px;
      border: none;
      display: block;
      pointer-events: none
    }

    .pdf-chat-caption {
      font-size: 11px;
      color: #0d6b69;
      padding: 6px 8px;
      border-top: 1px solid #eef3f3
    }

    .warning {
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 6px;
      padding: 7px 12px;
      color: #856404;
      margin-top: 8px
    }

    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin: 8px 0
    }

    .radio-option {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer
    }

    .radio-option input {
      accent-color: #0d6b69;
      width: 14px;
      height: 14px
    }

    .sample-btn {
      width: 100%;
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 7px 12px;
      font-size: 12px;
      cursor: pointer;
      text-align: left;
      margin-bottom: 4px;
      color: #d00;
      transition: background .15s;
      font-family: inherit
    }

    .sample-btn:hover {
      background: #fff0f0
    }

    .confirm-row {
      display: flex;
      align-items: flex-start;
      padding: 5px 0;
      border-bottom: 1px solid #f0f0f0;
      gap: 8px
    }

    .confirm-key {
      font-size: 12px;
      font-weight: 600;
      color: #555;
      width: 130px;
      flex-shrink: 0
    }

    .confirm-val {
      font-size: 12px;
      color: #333;
      flex: 1;
      word-break: break-all
    }

    .gift-card {
      border: 1px solid #e0e8e8;
      border-radius: 6px;
      padding: 8px;
      margin-bottom: 6px;
      font-size: 12px
    }

    .orange {
      color: #e8a020;
      font-weight: 600
    }

    /* Info panel */
    #info-panel {
      width: 170px;
      flex-shrink: 0;
      overflow-y: auto
    }

    .info-row {
      margin-bottom: 9px;
      padding-bottom: 7px;
      border-bottom: 1px solid #f0f0f0
    }

    .info-key {
      font-size: 11px;
      color: #888;
      margin-bottom: 1px
    }

    .info-val {
      font-size: 12px;
      font-weight: 700;
      color: #333
    }

    /* Spinner */
    #spinner-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, .7);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px
    }

    #spinner-overlay.active {
      display: flex
    }

    .spinner {
      width: 34px;
      height: 34px;
      border: 4px solid #e0e8e8;
      border-top-color: #0d6b69;
      border-radius: 50%;
      animation: spin .8s linear infinite
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    .spinner-text {
      font-size: 14px;
      color: #333
    }
    #img-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.82);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      cursor: zoom-out
    }
    #img-modal.open { display: flex }
    #img-modal img {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 8px;
      object-fit: contain;
      box-shadow: 0 8px 40px rgba(0,0,0,.6)
    }
    #img-modal-close {
      position: fixed;
      top: 16px;
      right: 20px;
      color: #fff;
      font-size: 28px;
      line-height: 1;
      cursor: pointer;
      user-select: none;
      opacity: .8
    }
    #img-modal-close:hover { opacity: 1 }

    #pdf-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .82);
      z-index: 10000;
      align-items: center;
      justify-content: center
    }

    #pdf-modal.open {
      display: flex
    }

    #pdf-modal-frame {
      width: 92vw;
      height: 92vh;
      border: none;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 8px 40px rgba(0, 0, 0, .6)
    }

    #pdf-modal-close {
      position: fixed;
      top: 16px;
      right: 20px;
      color: #fff;
      font-size: 28px;
      line-height: 1;
      cursor: pointer;
      user-select: none;
      opacity: .8
    }

    #pdf-modal-close:hover {
      opacity: 1
    }
  </style>
</head>

<body>

  <div id="header">
    <div class="header-left">
      <div class="my-badge">MY</div>
      <span class="header-title">MY 人事申請 Agent</span>
    </div>
    <div class="proto-badge">PROTOTYPE</div>
  </div>

  <div id="progress-bar"></div>

  <div id="main">
    <div id="mode-panel">
      <div class="panel-box">
        <div class="panel-title">モード選択</div>
        <button class="mode-btn" onclick="switchMode('tanshin_start')">開始</button>
        <button class="mode-btn" onclick="switchMode('roundtrip')">往復</button>
        <button class="mode-btn" onclick="switchMode('change')">変更</button>
        <button class="mode-btn" onclick="switchMode('stop')">停止</button>
        <!-- <button class="mode-btn" onclick="switchMode('expense')">経費申請</button> -->
        <!-- <button class="mode-btn" onclick="switchMode('faq')">FAQデモ</button> -->
        <hr class="divider">
        <button class="mode-btn" onclick="resetMode()">会話をリセット</button>
      </div>
    </div>

    <div id="chat-area">
      <div id="messages"></div>
      <div id="form-area"></div>
      <div id="faq-input-area">
        <input id="faq-input" type="text" placeholder="例：有給の申請ってどうやるの？" onkeydown="if(event.key==='Enter')faqSubmit()">
      </div>
    </div>

    <div id="info-panel">
      <div class="panel-box" id="info-box" style="display:none">
        <div class="panel-title">ⓘ 入力済み情報</div>
        <div id="info-content"></div>
      </div>
    </div>
  </div>

  <div id="spinner-overlay">
    <div class="spinner"></div>
    <div class="spinner-text" id="spinner-text">処理中…</div>
  </div>

  <script>
    // ─── State ────────────────────────────────────────────────────────────────────
    const S = {
      mode: 'tanshin_start', messages: [],
      // tanshin_start
      step: -1, step_prompted: false,
      start_month: '', start_date_str: '', reason: '重度傷病治療',
      care_person: '', dest_station: 'ふじみ野', family_station: '通町筋',
      round_trip_amount: '98296', annual_amount: '', transport: 'バス・航空機・鉄道', distance: '1157.1km', allowance: '',
      confirmed: [],
      // roundtrip
  rt_step: 0, rt_prompted: false, rt_fields: {}, rt_variant: 'move',
      // roundtrip+stay
      rms_step: 0, rms_prompted: false, rms_fields: {},
      // expense
      exp_step: -2, exp_prompted: false,
      exp_base_code: '', exp_expense_category: '生保',
      exp_extracted: {}, exp_description: '',
      exp_choice1: '', exp_large: '社外贈答（≠後援者会・セミナー等）',
      exp_medium: '手土産・差入れ', exp_small: '税抜単価１，０００円超（１名または１企業あたり）',
      exp_receipt_status: '', exp_public_official: '', exp_app_type: '',
      exp_gift_recipients: [],
    };

    const REASONS = ['重度傷病治療', '養育・教育', '介護・看護', 'その他'];
    const CAREGIVERS = ['申請者', '扶養家族等'];
  const MODES_ORDER = ['tanshin_start', 'roundtrip', 'roundtrip_stay', 'expense', 'faq'];
    const STAGES = ['情報入力', '証憑提出', 'ルート確認', '内容確認', '確認・申請'];

    // ─── Utilities ────────────────────────────────────────────────────────────────
    function gv(id) { const e = document.getElementById(id); return e ? e.value : ''; }

    function todayStr() {
      const d = new Date();
      return `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日`;
    }
    function nextMonthJp() {
      const d = new Date(); let m = d.getMonth() + 2, y = d.getFullYear();
      if (m > 12) { m = 1; y++; }
      return `${y}年${m}月`;
    }
    function remainToMarch(m) {
      const n = ((m - 1) % 12) + 1;
      return ((3 - n) % 12 + 12) % 12 + 1;
    }

    function md(text) {
      if (!text) return '';
      return text
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/:orange\[(.+?)\]/g, '<span class="orange">$1</span>')
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color:#0d6b69">$1</a>')
        .replace(/\n/g, '<br>');
    }

    function addBot(text) { S.messages.push({ r: 'bot', c: text }); renderMsgs(); scrollBot(); }
    function addUser(text) { S.messages.push({ r: 'user', c: text }); renderMsgs(); scrollBot(); }

    function renderMsgs() {
      document.getElementById('messages').innerHTML = S.messages.map(m => {
        const cls = m.r === 'bot' ? 'msg-bot' : 'msg-user';
        const av = m.r === 'bot'
          ? '<div class="msg-avatar avatar-bot">AI</div>'
          : '<div class="msg-avatar avatar-user">人</div>';
        const body = m.html ? m.c : md(m.c);
        return `<div class="msg ${cls}">${av}<div class="msg-content">${body}</div></div>`;
      }).join('');
    }
    function scrollBot() {
      const el = document.getElementById('messages');
      setTimeout(() => { el.scrollTop = el.scrollHeight; }, 40);
    }
    function setForm(html) { document.getElementById('form-area').innerHTML = html; }
    function clearForm() { document.getElementById('form-area').innerHTML = ''; }

    function spinner(text, ms, cb) {
      document.getElementById('spinner-text').textContent = text;
      document.getElementById('spinner-overlay').classList.add('active');
      setTimeout(() => { document.getElementById('spinner-overlay').classList.remove('active'); cb(); }, ms);
    }

    function showWarn(msg) {
      const fa = document.getElementById('form-area');
      let w = fa.querySelector('.warning'); if (w) w.remove();
      const d = document.createElement('div'); d.className = 'warning'; d.textContent = msg;
      fa.appendChild(d); setTimeout(() => d.remove(), 3000);
    }

    function escHtml(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function isPdfFile(file) {
      if (!file) return false;
      return file.type === 'application/pdf' || /\.pdf$/i.test(file.name || '');
    }

    function isImageFile(file) {
      if (!file) return false;
      return file.type.startsWith('image/') || /\.(png|jpe?g)$/i.test(file.name || '');
    }

    function clearPreviewUrl(dispEl) {
      if (!dispEl || !dispEl.dataset.previewUrl) return;
      URL.revokeObjectURL(dispEl.dataset.previewUrl);
      delete dispEl.dataset.previewUrl;
    }

    function clearSelectedFile(inp, disp) {
      const input = document.getElementById(inp);
      const n = document.getElementById(disp);
      if (input) input.value = '';
      if (n) {
        clearPreviewUrl(n);
        n.innerHTML = '';
      }
    }

    function isAcceptableUpload(file) {
      if (!file) return false;
      return isPdfFile(file) || isImageFile(file);
    }

    function handleDrop(ev, inp, disp) {
      ev.preventDefault();
      ev.stopPropagation();
      ev.currentTarget.classList.remove('dragover');
      const file = ev.dataTransfer?.files?.[0];
      if (!file) return;
      if (!isAcceptableUpload(file)) {
        showWarn('アップロードできるのは PDF / PNG / JPG / JPEG のみです。');
        return;
      }
      const input = document.getElementById(inp);
      if (!input) return;
      const dt = new DataTransfer();
      dt.items.add(file);
      input.files = dt.files;
      showFileName(inp, disp);
    }

    function showFileName(inp, disp) {
      const f = document.getElementById(inp).files[0];
      const n = document.getElementById(disp);
      if (!n) return;
      clearPreviewUrl(n);
      if (!f) { n.innerHTML = ''; return; }

      if (isPdfFile(f)) {
        const pdfUrl = URL.createObjectURL(f);
        n.dataset.previewUrl = pdfUrl;
        n.innerHTML = `<div class="pdf-inline-thumb" onclick="event.stopPropagation();openPdfModal('${pdfUrl}')" title="クリックしてPDFを表示">
            <embed src="${pdfUrl}#toolbar=0&navpanes=0&scrollbar=0&page=1" type="application/pdf">
          </div>
          <div class="file-meta-row"><span>📎 ${escHtml(f.name)}</span><button type="button" class="file-clear-btn" onclick="event.stopPropagation();clearSelectedFile('${inp}','${disp}')">削除</button></div>`;
      } else if (isImageFile(f)) {
        const imgUrl = URL.createObjectURL(f);
        n.dataset.previewUrl = imgUrl;
        n.innerHTML = `<div class="img-inline-thumb" onclick="event.stopPropagation();openImgModal('${imgUrl}')" title="クリックして画像を表示">
            <img src="${imgUrl}" alt="${escHtml(f.name)}">
          </div>
          <div class="file-meta-row"><span>📎 ${escHtml(f.name)}</span><button type="button" class="file-clear-btn" onclick="event.stopPropagation();clearSelectedFile('${inp}','${disp}')">削除</button></div>`;
      } else {
        n.innerHTML = `<div class="file-meta-row"><span>📎 ${escHtml(f.name)}</span><button type="button" class="file-clear-btn" onclick="event.stopPropagation();clearSelectedFile('${inp}','${disp}')">削除</button></div>`;
      }
    }

    function addFileMessage(file, msg, cb) {
      const isImg = isImageFile(file);
      if (isImg) {
        const reader = new FileReader();
        reader.onload = e => {
          const html = `${msg}<br><img src="${e.target.result}" style="max-width:220px;max-height:180px;border-radius:6px;margin-top:6px;display:block;cursor:zoom-in;" onclick="openImgModal(this.src)">`;
          S.messages.push({ r: 'user', c: html, html: true });
          renderMsgs(); scrollBot();
          cb();
        };
        reader.readAsDataURL(file);
      } else if (isPdfFile(file)) {
        const pdfUrl = URL.createObjectURL(file);
        const html = `${msg}<br><div class="pdf-chat-thumb" onclick="openPdfModal('${pdfUrl}')" title="クリックしてPDFを表示">
            <embed src="${pdfUrl}#toolbar=0&navpanes=0&scrollbar=0&page=1" type="application/pdf">
            <div class="pdf-chat-caption">📄 ${escHtml(file.name)}</div>
          </div>`;
        S.messages.push({ r: 'user', c: html, html: true });
        renderMsgs(); scrollBot();
        cb();
      } else {
        addUser(msg + '\n\n[' + file.name + ']');
        cb();
      }
    }

    function fileInput(inputId, dispId, label) {
      return `<div class="form-group"><label class="form-label">${label}</label>
    <div class="file-upload-area" onclick="document.getElementById('${inputId}').click()"
         ondragover="event.preventDefault();this.classList.add('dragover')"
         ondragleave="this.classList.remove('dragover')"
         ondrop="handleDrop(event,'${inputId}','${dispId}')">
      クリック または ドラッグ&ドロップでファイルを選択
      <div class="file-name" id="${dispId}"></div>
    </div>
    <input type="file" id="${inputId}" accept=".pdf,.png,.jpg,.jpeg" style="display:none"
           onchange="showFileName('${inputId}','${dispId}')">
  </div>`;

    // ─── Mode switching ───────────────────────────────────────────────────────────
    function switchMode(mode) {
      resetFor(mode);
      document.querySelectorAll('.mode-btn').forEach(b => {
        const oc = b.getAttribute('onclick') || '';
        const m = oc.match(/switchMode\('([^']+)'\)/);
        b.classList.toggle('active', !!m && m[1] === mode);
      });
      renderMode();
    }
    function resetMode() { switchMode(S.mode); }

    function resetFor(mode) {
      Object.assign(S, {
        mode, messages: [],
        step: -1, step_prompted: false,
        start_month: '', start_date_str: '', reason: '重度傷病治療',
        care_person: '', dest_station: 'ふじみ野', family_station: '通町筋',
        round_trip_amount: '98296', annual_amount: '', transport: 'バス・航空機・鉄道', distance: '1157.1km', allowance: '',
        confirmed: [],
  rt_step: 0, rt_prompted: false, rt_fields: {}, rt_variant: 'move',
        rms_step: 0, rms_prompted: false, rms_fields: {},

        exp_base_code: '', exp_expense_category: '生保',
        exp_extracted: {}, exp_description: '',

      clearForm();
      document.getElementById('faq-input-area').style.display = 'none';
      updateProgress(); updateInfoPanel();
      if (S.mode === 'tanshin_start') renderTanshin();
      else if (S.mode === 'roundtrip') renderRT();
      else if (S.mode === 'roundtrip_stay') renderRMS();
      else if (S.mode === 'change' || S.mode === 'stop') renderComingSoon();
      else if (S.mode === 'expense') renderExp();
      else renderFAQ();

      if (S.messages.length === 0) addBot('準備中です');
      clearForm();
    }

    // ─── Progress bar ─────────────────────────────────────────────────────────────
    function tanshinStage() {
      if (S.step === -1) return 1;
      if ([10, 20, 30, 31, 32].includes(S.step)) return 2;
      if (S.step === 0) return 3;
      if (S.step === 1) return 4;
      return 5;
    }
    function updateProgress() {
      const el = document.getElementById('progress-bar');
      if (S.mode !== 'tanshin_start') { el.innerHTML = ''; return; }
      const cur = tanshinStage();
      let h = '<div class="prog-items">';
      STAGES.forEach((lbl, i) => {
        const n = i + 1, cls = n < cur ? 'prog-done' : n === cur ? 'prog-current' : 'prog-future';
        h += `<div class="prog-item ${cls}"><div class="prog-circle">${n}</div><span class="prog-label">${lbl}</span></div>`;
        if (n < STAGES.length) {
          h += `<div class="prog-line ${n < cur ? 'prog-line-done' : 'prog-line-future'}"></div>`;
        }
      });
      el.innerHTML = h + '</div>';
    }

    // ─── Info panel ───────────────────────────────────────────────────────────────
    function setConfirmed(key, label, value) {
      const idx = S.confirmed.findIndex(e => e[0] === key);
      if (idx >= 0) S.confirmed[idx] = [key, label, value];
      else S.confirmed.push([key, label, value]);
    }
    function updateInfoPanel() {
      const box = document.getElementById('info-box');
      if (!['tanshin_start', 'roundtrip', 'roundtrip_stay'].includes(S.mode) || S.confirmed.length === 0) { box.style.display = 'none'; return; }
      box.style.display = '';

      content.innerHTML = S.confirmed
        .map(([, label, v]) => `<div class="info-row"><div class="info-key">${label}</div><div class="info-val">${v}</div></div>`)
        .join('');

    function tGoto(step, prompted) {
      S.step = step; S.step_prompted = !!prompted;
      updateProgress(); updateInfoPanel(); renderTanshin();

      const s = S.step;

      else if (s === 30) renderT30();
      else if (s === 31) renderT31();
      else if (s === 32) renderT32();
      else if (s === 0) renderT0();

      setForm(`<div class="form-box">

      const item = gv('g_item'), amt = parseInt(gv('g_amt')) || 0, name = gv('g_name'), addr = gv('g_addr');
      S.exp_gift_recipients.push({ '贈答品名': item, '贈答合計金額（税込）': amt, '贈答先名称': name, '贈答先所在地（住所）': addr });
      addUser(`【贈答先 ${S.exp_gift_recipients.length}件目】\n贈答品名: ${item}\n金額: ${amt.toLocaleString()}円\n贈答先名称: ${name}`);
      addBot(`贈答先情報を${S.exp_gift_recipients.length}件登録しました。`);
      expGoto(19);
    }

    // Step 19: 公務員確認
    function renderE19() {
      if (!S.exp_prompted) { addBot('贈答先に公務員を含みますか？'); S.exp_prompted = true; }
      setForm(`<div class="form-box">
    <div class="radio-group">
      <label class="radio-option"><input type="radio" name="e_pub" value="はい"> はい</label>
      <label class="radio-option"><input type="radio" name="e_pub" value="いいえ" checked> いいえ</label>
    </div>
    <button class="btn-primary" onclick="submitE19()" style="margin-top:10px">決定</button>
  </div>`);
    }
    function submitE19() {
      const v = document.querySelector('input[name="e_pub"]:checked')?.value;
      if (!v) { showWarn('選択してください。'); return; }
      S.exp_public_official = v; addUser(v); expGoto(22);
    }

    // Step 22: 確認
    function renderE22() {
      if (!S.exp_prompted) { addBot('以下入力内容に間違いがあれば修正してください。'); S.exp_prompted = true; }
      const ex = S.exp_extracted;
      const items = [];
      if (S.exp_base_code) items.push(['拠点コード', S.exp_base_code]);
      if (S.exp_expense_category) items.push(['支出区分', S.exp_expense_category]);
      if (ex['実施日']) items.push(['実施日', ex['実施日']]);
      if (ex['取引先名称']) items.push(['取引先名称', ex['取引先名称']]);
      if (ex['取引先住所']) items.push(['取引先住所', ex['取引先住所']]);
      if (ex['非登録事業者']) items.push(['非登録事業者', ex['非登録事業者']]);
      if (ex['金額'] != null) items.push(['金額', ex['金額'].toLocaleString() + '円']);
      if (ex['消費税額'] != null) items.push(['消費税額', ex['消費税額'].toLocaleString() + '円']);
      if (S.exp_large) items.push(['大分類', S.exp_large]);
      if (S.exp_medium) items.push(['中分類', S.exp_medium]);
      if (S.exp_small) items.push(['小分類', S.exp_small]);
      if (S.exp_receipt_status) items.push(['受領書取り付け済み', S.exp_receipt_status]);
      if (S.exp_public_official) items.push(['贈答先に公務員を含む', S.exp_public_official]);
      if (S.exp_app_type) items.push(['申請パターン', S.exp_app_type]);
      const rows = items.map(([k, v]) => `<div class="confirm-row"><span class="confirm-key">${k}</span><span class="confirm-val">${v}</span></div>`).join('');
      let gifts = '';
      if (S.exp_gift_recipients.length > 0) {
        gifts = `<div style="margin-top:10px"><div class="section-label">贈答先情報（${S.exp_gift_recipients.length}件）</div>` +
          S.exp_gift_recipients.map((g, i) => `<div class="gift-card"><strong>贈答先${i + 1}：${g['贈答先名称'] || '未入力'}</strong><br>贈答品名: ${g['贈答品名'] || ''}<br>金額: ${(g['贈答合計金額（税込）'] || 0).toLocaleString()}円</div>`).join('') + '</div>';
      }
      setForm(`<div class="form-box">
    <div class="section-label">入力内容確認</div>
    <div style="border:1px solid #e0e8e8;border-radius:6px;padding:10px;margin-bottom:10px">
      <div class="section-label" style="font-size:12px;background:#f0f5f5;padding:4px 8px;border-radius:4px">入力した項目</div>
      ${rows}${gifts}
    </div>
    <button class="btn-primary" onclick="submitE22()">次へ</button>
  </div>`);
    }
    function submitE22() {
      addUser('入力内容を確認しました。');
      addBot('チャットボットでの入力はここまでです。 \n\n [このリンク](https://example.com)から拠点会計システムを開き、申請を完了してください。 \n\n この証憑画像の「案件登録」は実施済みです。');
      expGoto(23);
    }

    // Step 23: 完了
    function renderE23() {
      setForm(`<div class="btn-row"><button class="btn-secondary" onclick="switchMode('expense')">最初に戻る</button></div>`);
    }

    // ══════════════════════════════════════════════════════════════════════════════
    // FAQ
    // ══════════════════════════════════════════════════════════════════════════════
    const FAQ_DATA = [
      {
        title: '有給休暇の申請', kw: ['有給', '休暇', '年休', '有休', '休み', '欠勤'],
        ans: '有給休暇の申請方法は社内ルールで異なります。\n一般的には、(1) 事前申請 → (2) 上長承認 → (3) 勤怠/休暇システム反映、の流れです。\n\n確認したい点：\n- 取得希望日（単日/連続）\n- 申請の締め切り（何営業日前まで）\n- 半休/時間休の可否'
      },
      {
        title: '残業申請・残業代', kw: ['残業', '時間外', '深夜', '休日出勤', '残業代'],
        ans: '残業の事前申請が必要な会社が多いです。\n- 事前申請の要否（やむを得ない場合の事後申請可否）\n- 36協定の上限や注意点\n- 割増賃金（時間外/深夜/休日）の扱い\n\n社内規程（就業規則・賃金規程）や勤怠ルールを確認してください。'
      },
      {
        title: '交通費・出張精算', kw: ['交通費', '精算', '出張', '経費', '領収書'],
        ans: '交通費/経費精算は、(1) 申請 → (2) 添付（領収書等）→ (3) 承認 → (4) 振込/給与で支給、が一般的です。\n\n確認したい点：\n- 申請期限（月末締め等）\n- IC履歴/領収書の要否\n- タクシー利用の条件'
      },
      {
        title: '社会保険・扶養', kw: ['社会保険', '扶養', '健康保険', '年金', '保険'],
        ans: '社会保険の手続きは条件や期限があるため、状況確認が重要です。\n例：扶養追加/削除、氏名・住所変更、退職時の手続きなど。\n\n差し支えない範囲で、どの手続き（扶養追加/変更/退職等）か教えてください。'
      },
    ];

    function renderFAQ() {
      if (S.messages.length === 0) {
        addBot('こんにちは。人事向けチャットボットのサンプルです。\n\n『有給』『残業』『交通費』『社会保険』など、気になるキーワードで聞いてみてください。');
      }
      clearForm();
      document.getElementById('faq-input-area').style.display = 'block';
    }
    function faqSubmit() {
      const el = document.getElementById('faq-input');
      const txt = el.value.trim(); if (!txt) return;
      el.value = '';
      addUser(txt);
      setTimeout(() => addBot(faqReply(txt)), 500);
    }
    function faqReply(msg) {
      const low = msg.toLowerCase();
      let best = null, bscore = 0;
      FAQ_DATA.forEach(item => {
        let s = 0; item.kw.forEach(k => { if (low.includes(k)) s++; });
        if (s > bscore) { best = item; bscore = s; }
      });
      const dt = new Date().toISOString().slice(0, 10);
      let rep;
      if (!best || bscore === 0) {
        rep = '明治安田の人事チャットボット（サンプル）です。\n\nご相談内容をもう少し具体的に教えてください。例えば：\n- いつ/だれ/どの制度（有給・残業・経費・社会保険など）\n- 期限があるか\n- 参照したい社内規程名やリンク（あれば）';
      } else {
        rep = `【${best.title}】\n${best.ans}\n\n参照（サンプルFAQ）：${best.title}`;
      }
      rep += `\n\n---\n※この回答はサンプルです。最終判断は社内規程・人事担当の案内をご確認ください。\n（${dt}）`;
      return rep;
    }

    // ─── Init ─────────────────────────────────────────────────────────────────────
    window.onload = () => { switchMode('tanshin_start'); };

    function openImgModal(src) {
      document.getElementById('img-modal-img').src = src;
      document.getElementById('img-modal').classList.add('open');
    }
    function closeImgModal() {
      document.getElementById('img-modal').classList.remove('open');
    }

    function openPdfModal(src) {
      document.getElementById('pdf-modal-frame').src = src;
      document.getElementById('pdf-modal').classList.add('open');
    }
    function closePdfModal() {
      document.getElementById('pdf-modal').classList.remove('open');
      document.getElementById('pdf-modal-frame').src = '';
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        closeImgModal();
        closePdfModal();
      }
    });
  </script>

  <div id="img-modal" onclick="closeImgModal()">
    <span id="img-modal-close" onclick="closeImgModal()">&#x2715;</span>
    <img id="img-modal-img" src="" alt="preview" onclick="event.stopPropagation()">
  </div>

  <div id="pdf-modal" onclick="closePdfModal()">
    <span id="pdf-modal-close" onclick="closePdfModal()">&#x2715;</span>
    <iframe id="pdf-modal-frame" src="" title="PDF Preview" onclick="event.stopPropagation()"></iframe>
  </div>
</body>

</html>
